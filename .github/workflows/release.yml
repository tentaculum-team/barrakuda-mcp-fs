name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Cross-compile the 4 platform binaries directly — no Makefile, one
      # less file for a community mod author to learn.
      - name: Cross-compile
        run: |
          BINARY=barrakuda-mcp-fs
          GOOS=darwin  GOARCH=arm64 go build -buildvcs=false -o bin/${BINARY}-aarch64-apple-darwin      ./cmd/api
          GOOS=darwin  GOARCH=amd64 go build -buildvcs=false -o bin/${BINARY}-x86_64-apple-darwin       ./cmd/api
          GOOS=linux   GOARCH=amd64 go build -buildvcs=false -o bin/${BINARY}-x86_64-unknown-linux-gnu  ./cmd/api
          GOOS=windows GOARCH=amd64 go build -buildvcs=false -o bin/${BINARY}-x86_64-pc-windows-msvc.exe ./cmd/api

      # Packages exactly the 3 platforms manifest.json declares
      # (windows/linux/macos-arm64) — same set the old make_release_zip.py
      # produced. Each zip = the entry binary, renamed to the bare `entry`
      # name from manifest.json (`.exe` on Windows), + manifest.json itself.
      - name: Package release zips
        run: |
          set -euo pipefail
          entry=$(jq -r .entry manifest.json)
          mkdir -p release

          package() {
            os_key=$1 suffix=$2 is_windows=$3
            stage=$(mktemp -d)
            if [ "$is_windows" = "1" ]; then
              cp "bin/${BINARY}-${suffix}" "${stage}/${entry}.exe"
            else
              cp "bin/${BINARY}-${suffix}" "${stage}/${entry}"
              chmod +x "${stage}/${entry}"
            fi
            cp manifest.json "${stage}/manifest.json"
            (cd "${stage}" && zip -q "${GITHUB_WORKSPACE}/release/${BINARY}-${os_key}.zip" ./*)
          }

          BINARY=barrakuda-mcp-fs
          package windows x86_64-pc-windows-msvc.exe 1
          package linux x86_64-unknown-linux-gnu 0
          package macos aarch64-apple-darwin 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" release/*.zip --title "${{ github.ref_name }}" --generate-notes
